# ============================================================
# API 模块 — 测试环境配置 (staging)
# 运行方式: java -jar xhbookstore-api.jar --spring.profiles.active=staging
#           mvn spring-boot:run -Dspring-boot.run.profiles=staging
# ============================================================

spring:
  datasource:
    druid:
      master:
        url: jdbc:mysql://localhost:3306/xhbookstore?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
        username: xhbookstore
        password: txkrnsXy3CWcECxW
      initialSize: 10
      minIdle: 10
      maxActive: 50
      statViewServlet:
        enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      password: xhbookstore
      database: 0

# 安全配置
security:
  jwt:
    secret: xhbookstore-jwt-secret-key-staging-2026
    access-token-expire: 7200
    refresh-token-expire: 2592000
  rate-limit:
    login-per-minute: 10
    write-per-minute: 60
    points-per-minute: 30

# 微信小程序（测试环境）
wechat:
  app-id: wx799190cc716e35f1
  app-secret: fd365046aaa2cbf3bd68adcc8a63b0b2
  token-cache-key: wechat:access_token
  token-expire-seconds: 7200
  token-refresh-ahead: 300

# 腾讯云COS（测试环境）
cos:
  secret-id: test-secret-id
  secret-key: test-secret-key
  region: ap-guangzhou
  bucket: xhbookstore-test-1250000000
  base-url: https://xhbookstore-test-1250000000.cos.ap-guangzhou.myqcloud.com
  max-file-size: 10485760

logging:
  level:
    com.xhbookstore.api: info
    com.xhbookstore: info
    org.springframework: warn
